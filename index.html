<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Jump!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f7f7; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
  #game-container { position: relative; }
  canvas { border: 2px solid #535353; background: #fff; display: block; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; background: rgba(255,255,255,0.92); }
  #overlay.clickable { pointer-events: auto; cursor: pointer; }
  #overlay.hidden { display: none; }
  #message { font-size: 24px; color: #535353; font-weight: bold; }
  #sub-message { font-size: 14px; color: #757575; margin-top: 8px; }
  #leaderboard { margin-top: 12px; width: 90%; max-width: 500px; }
  #leaderboard table { width: 100%; border-collapse: collapse; font-size: 13px; }
  #leaderboard th { text-align: left; color: #535353; border-bottom: 2px solid #535353; padding: 4px 8px; }
  #leaderboard td { padding: 3px 8px; color: #757575; border-bottom: 1px solid #e0e0e0; }
  #leaderboard td:first-child, #leaderboard th:first-child { text-align: center; width: 30px; }
  #leaderboard td:nth-child(3), #leaderboard th:nth-child(3) { text-align: right; }
  #leaderboard td:nth-child(4), #leaderboard th:nth-child(4) { text-align: right; font-size: 11px; }
  #name-input-area { margin-top: 10px; display: flex; gap: 8px; align-items: center; }
  #name-input-area input { font-family: 'Courier New', monospace; font-size: 14px; padding: 4px 8px; border: 2px solid #535353; outline: none; width: 160px; }
  #name-input-area button { font-family: 'Courier New', monospace; font-size: 14px; padding: 4px 12px; border: 2px solid #535353; background: #535353; color: #fff; cursor: pointer; }
  #name-input-area button:hover { background: #333; }
</style>
</head>
<body>
<div id="game-container">
  <canvas id="game" width="800" height="250"></canvas>
  <div id="overlay" class="clickable">
    <div id="message">DINO JUMP!</div>
    <div id="sub-message">Press SPACE or tap to start</div>
    <div id="leaderboard"></div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://trbafghbzxluxbeqqsed.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VkwvfoYz5euu5gchEvgUTg_orWb2Kl3';

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const message = document.getElementById('message');
const subMessage = document.getElementById('sub-message');
const leaderboardDiv = document.getElementById('leaderboard');

const GROUND_Y = 200;
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const INITIAL_SPEED = 5;
const MAX_SPEED = 12;

let dino, cacti, clouds, score, highScore = 0, speed, gameState, frameCount;
let playerName = localStorage.getItem('dinoPlayerName') || '';
let playerIP = '';

// Fetch player IP
fetch('https://api.ipify.org?format=json')
  .then(r => r.json())
  .then(data => { playerIP = data.ip; })
  .catch(() => { playerIP = 'unknown'; });

// Supabase REST helpers
function supabaseGet(table, query) {
  return fetch(`${SUPABASE_URL}/rest/v1/${table}?${query}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  }).then(r => r.json());
}

function supabaseInsert(table, data) {
  return fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(data)
  });
}

async function fetchLeaderboard() {
  try {
    const rows = await supabaseGet('leaderboard', 'select=name,score,ip_address,created_at&order=score.desc&limit=10');
    return Array.isArray(rows) ? rows : [];
  } catch { return []; }
}

function renderLeaderboard(rows, showInput) {
  if (!rows.length && !showInput) {
    leaderboardDiv.innerHTML = '<div style="color:#aaa;margin-top:8px;">No scores yet. Be the first!</div>';
    return;
  }
  let html = '<table><tr><th>#</th><th>Name</th><th>Score</th><th>IP</th></tr>';
  rows.forEach((r, i) => {
    const ip = r.ip_address || '?';
    html += `<tr><td>${i + 1}</td><td>${esc(r.name)}</td><td>${r.score}</td><td>${esc(ip)}</td></tr>`;
  });
  html += '</table>';

  if (showInput) {
    html += `<div id="name-input-area">
      <input id="name-field" type="text" maxlength="20" placeholder="Your name" value="${esc(playerName)}" />
      <button id="submit-score-btn">Submit</button>
    </div>
    <div id="sub-message" style="font-size:12px;color:#999;margin-top:6px;">Submit score, then SPACE to play again</div>`;
  }

  leaderboardDiv.innerHTML = html;

  if (showInput) {
    const input = document.getElementById('name-field');
    const btn = document.getElementById('submit-score-btn');
    input.addEventListener('click', e => e.stopPropagation());
    input.addEventListener('keydown', e => {
      e.stopPropagation();
      if (e.key === 'Enter') btn.click();
    });
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const name = input.value.trim();
      if (!name) { input.focus(); return; }
      playerName = name;
      localStorage.setItem('dinoPlayerName', name);
      btn.disabled = true;
      btn.textContent = '...';
      await supabaseInsert('leaderboard', { name, score, ip_address: playerIP });
      const fresh = await fetchLeaderboard();
      renderLeaderboard(fresh, false);
      subMessage.textContent = `Score: ${score}  Best: ${highScore} — Press SPACE or tap to play again`;
      gameState = 'submitted';
    });
    setTimeout(() => input.focus(), 50);
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function init() {
  dino = { x: 60, y: GROUND_Y, w: 40, h: 44, vy: 0, onGround: true, legFrame: 0 };
  cacti = [];
  clouds = [];
  score = 0;
  speed = INITIAL_SPEED;
  frameCount = 0;
  gameState = 'ready';
}

async function showStartScreen() {
  message.textContent = 'DINO JUMP!';
  subMessage.textContent = 'Press SPACE or tap to start';
  overlay.classList.remove('hidden');
  overlay.classList.add('clickable');
  const rows = await fetchLeaderboard();
  renderLeaderboard(rows, false);
}

function startGame() {
  if (gameState === 'running') return;
  init();
  gameState = 'running';
  overlay.classList.remove('clickable');
  overlay.classList.add('hidden');
  leaderboardDiv.innerHTML = '';
}

async function gameOver() {
  gameState = 'over';
  if (score > highScore) highScore = score;
  message.textContent = 'GAME OVER';
  subMessage.textContent = `Score: ${score}  Best: ${highScore}`;
  overlay.classList.remove('hidden');
  overlay.classList.add('clickable');
  const rows = await fetchLeaderboard();
  renderLeaderboard(rows, true);
}

function handleAction() {
  if (gameState === 'over') {
    // Don't restart while name input is visible — let them submit first
    const input = document.getElementById('name-field');
    if (input) return;
    startGame();
    return;
  }
  if (gameState === 'submitted') { startGame(); return; }
  if (gameState === 'ready') { startGame(); }
  if (dino.onGround) {
    dino.vy = JUMP_FORCE;
    dino.onGround = false;
  }
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleAction(); }
});
canvas.addEventListener('click', handleAction);
overlay.addEventListener('click', handleAction);

// Drawing helpers
function drawDino() {
  ctx.fillStyle = '#535353';
  ctx.fillRect(dino.x + 4, dino.y - 40, 28, 32);
  ctx.fillRect(dino.x + 16, dino.y - 44, 24, 16);
  ctx.fillStyle = '#fff';
  ctx.fillRect(dino.x + 32, dino.y - 42, 4, 4);
  ctx.fillStyle = '#535353';
  ctx.fillRect(dino.x + 28, dino.y - 30, 12, 2);
  ctx.fillRect(dino.x, dino.y - 24, 8, 4);
  ctx.fillRect(dino.x - 4, dino.y - 32, 8, 6);
  if (dino.onGround && gameState === 'running') {
    dino.legFrame = (dino.legFrame + 0.15) % 2;
    if (dino.legFrame < 1) {
      ctx.fillRect(dino.x + 8, dino.y - 8, 6, 10);
      ctx.fillRect(dino.x + 22, dino.y - 12, 6, 6);
    } else {
      ctx.fillRect(dino.x + 8, dino.y - 12, 6, 6);
      ctx.fillRect(dino.x + 22, dino.y - 8, 6, 10);
    }
  } else {
    ctx.fillRect(dino.x + 8, dino.y - 8, 6, 10);
    ctx.fillRect(dino.x + 22, dino.y - 8, 6, 10);
  }
}

function drawCactus(c) {
  ctx.fillStyle = '#2a6e2a';
  if (c.type === 0) {
    ctx.fillRect(c.x + 6, GROUND_Y - 34, 8, 34);
    ctx.fillRect(c.x, GROUND_Y - 24, 6, 12);
    ctx.fillRect(c.x + 14, GROUND_Y - 28, 6, 12);
  } else if (c.type === 1) {
    ctx.fillRect(c.x + 6, GROUND_Y - 46, 8, 46);
    ctx.fillRect(c.x, GROUND_Y - 36, 6, 14);
    ctx.fillRect(c.x + 14, GROUND_Y - 40, 6, 14);
  } else {
    ctx.fillRect(c.x + 2, GROUND_Y - 30, 8, 30);
    ctx.fillRect(c.x + 16, GROUND_Y - 38, 8, 38);
    ctx.fillRect(c.x + 24, GROUND_Y - 28, 6, 12);
  }
}

function drawCloud(c) {
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(c.x, c.y, 40, 10);
  ctx.fillRect(c.x + 8, c.y - 6, 24, 6);
  ctx.fillRect(c.x + 4, c.y + 10, 32, 4);
}

function getHitbox(c) {
  if (c.type === 0) return { x: c.x, y: GROUND_Y - 34, w: 20, h: 34 };
  if (c.type === 1) return { x: c.x, y: GROUND_Y - 46, w: 20, h: 46 };
  return { x: c.x, y: GROUND_Y - 38, w: 26, h: 38 };
}

function collides(a, b) {
  const shrink = 6;
  return a.x + shrink < b.x + b.w - shrink &&
         a.x + a.w - shrink > b.x + shrink &&
         a.y - a.h + shrink < b.y + b.h &&
         a.y > b.y + shrink;
}

function update() {
  if (gameState !== 'running') return;
  frameCount++;
  score = Math.floor(frameCount / 6);
  speed = Math.min(INITIAL_SPEED + score * 0.005, MAX_SPEED);

  dino.vy += GRAVITY;
  dino.y += dino.vy;
  if (dino.y >= GROUND_Y) { dino.y = GROUND_Y; dino.vy = 0; dino.onGround = true; }

  const lastCactus = cacti[cacti.length - 1];
  const minGap = 300 / (speed / INITIAL_SPEED);
  if (!lastCactus || lastCactus.x < canvas.width - minGap - Math.random() * 200) {
    cacti.push({ x: canvas.width + Math.random() * 100, type: Math.floor(Math.random() * 3) });
  }

  for (let i = cacti.length - 1; i >= 0; i--) {
    cacti[i].x -= speed;
    if (cacti[i].x < -40) cacti.splice(i, 1);
  }

  if (Math.random() < 0.005) {
    clouds.push({ x: canvas.width, y: 30 + Math.random() * 60 });
  }
  for (let i = clouds.length - 1; i >= 0; i--) {
    clouds[i].x -= speed * 0.3;
    if (clouds[i].x < -50) clouds.splice(i, 1);
  }

  for (const c of cacti) {
    const hb = getHitbox(c);
    if (collides({ x: dino.x, y: dino.y, w: 36, h: 40 }, hb)) {
      gameOver();
      return;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  clouds.forEach(drawCloud);

  ctx.strokeStyle = '#535353';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y + 2);
  ctx.lineTo(canvas.width, GROUND_Y + 2);
  ctx.stroke();

  ctx.fillStyle = '#d0d0d0';
  const offset = gameState === 'running' ? (frameCount * speed) % 20 : 0;
  for (let x = -offset; x < canvas.width; x += 20) {
    ctx.fillRect(x, GROUND_Y + 6, 8, 1);
    ctx.fillRect(x + 12, GROUND_Y + 10, 5, 1);
  }

  cacti.forEach(drawCactus);
  drawDino();

  ctx.fillStyle = '#535353';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(`HI ${String(highScore).padStart(5, '0')}  ${String(score).padStart(5, '0')}`, canvas.width - 12, 24);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

init();
showStartScreen();
loop();
</script>
</body>
</html>
